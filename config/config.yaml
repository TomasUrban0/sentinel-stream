data:
  features:
    - air_temperature_k
    - process_temperature_k
    - rotational_speed_rpm
    - torque_nm
    - tool_wear_min
  split:
    val_fraction: 0.15
    test_fraction: 0.15
    seed: 42

model:
  xgboost:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    min_child_weight: 1
  keras_dense:
    hidden_layers: [64, 32]
    epochs: 60
    batch_size: 128
    learning_rate: 0.001
    dropout: 0.2

monitoring:
  drift_threshold: 0.15
  reference_sample_size: 2000

api:
  host: 0.0.0.0
  port: 8000
  default_model: xgboost
